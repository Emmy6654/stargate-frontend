name: Deploy Frontend Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.stargate.finance' }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.stargate.finance' }}
      NEXT_PUBLIC_ENV: production
      NEXT_PUBLIC_CHAIN_ENV: mainnet
      NEXT_PUBLIC_STELLAR_NETWORK: mainnet
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run build:widget
      - name: Resolve Vercel account ID
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_PROJECT_ID"
          project_json="$(curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID")"
          account_id="$(node -e "const data = JSON.parse(process.argv[1]); if (!data.accountId) throw new Error(data.error?.message || 'Missing Vercel accountId'); process.stdout.write(data.accountId)" "$project_json")"
          echo "VERCEL_ORG_ID=$account_id" >> "$GITHUB_ENV"
          mkdir -p .vercel
          node -e "const fs = require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }, null, 2))"
      - run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
      - run: npx vercel build --prod --token "$VERCEL_TOKEN"
      - run: npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
      - name: Smoke test frontend
        run: curl -fsSI "$NEXT_PUBLIC_APP_URL" | grep -Eiq 'strict-transport-security|x-content-type-options'
