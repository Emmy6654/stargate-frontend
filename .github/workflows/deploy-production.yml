name: Deploy Frontend Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.stargate.finance' }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.stargate.finance' }}
      NEXT_PUBLIC_ENV: production
      NEXT_PUBLIC_CHAIN_ENV: mainnet
      NEXT_PUBLIC_STELLAR_NETWORK: mainnet
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm run build:widget
      - run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"
      - name: Smoke test frontend
        run: curl -fsSI "$NEXT_PUBLIC_APP_URL" | grep -Eiq 'strict-transport-security|x-content-type-options'
